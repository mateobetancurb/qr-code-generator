	<body>
		<script>
			(function () {
				const savedMode = localStorage.getItem("darkMode");
				const isDark =
					savedMode === null
						? window.matchMedia("(prefers-color-scheme: dark)").matches
						: savedMode === "true";
				if (isDark) document.documentElement.classList.add("dark");
			})();
		</script>
